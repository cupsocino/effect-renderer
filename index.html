<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaiya EFT &amp; Cloak Renderer</title>
  </head>
  <body>
    <main id="app">
      <section id="viewport"></section>
      <aside id="panel">
        <h1>EFT &amp; Cloak Renderer</h1>

        <div class="source-picker">
          <div class="source-mode" role="group" aria-label="Data source">
            <button id="directoryModeButton" type="button" class="active" aria-pressed="true">Directory</button>
            <button id="archiveModeButton" type="button" aria-pressed="false">SAH/SAF</button>
          </div>

          <label id="dataRootLabel">
            Data directory
            <input id="dataRootInput" type="file" webkitdirectory multiple />
          </label>

          <label id="dataArchiveLabel" hidden>
            SAH/SAF archive pair
            <input id="dataArchiveInput" type="file" accept=".sah,.saf,.SAH,.SAF" multiple />
          </label>
        </div>

        <div id="assetStatus" class="status-card status-empty" role="status" aria-live="polite">
          <span class="status-dot"></span>
          <div>
            <strong id="assetStatusTitle">No assets indexed</strong>
            <span id="assetStatusDetail">Select a data directory or a SAH/SAF archive pair.</span>
          </div>
        </div>

        <div class="browser-tabs" role="tablist" aria-label="Asset browser mode">
          <button id="libraryTabButton" type="button" class="active" role="tab" aria-selected="true" aria-controls="libraryTab">EFT Library</button>
          <button id="skillTabButton" type="button" role="tab" aria-selected="false" aria-controls="skillTab">Skill Effects</button>
          <button id="cloakTabButton" type="button" role="tab" aria-selected="false" aria-controls="cloakTab">Cloaks</button>
        </div>

        <section id="libraryTab" class="browser-panel" role="tabpanel" aria-labelledby="libraryTabButton">
          <label>
            EFT from data directory
            <select id="libraryFileSelect"></select>
          </label>

          <label>
            EFT / EF2 / EF3 file
            <input id="eftInput" type="file" accept=".eft,.ef2,.ef3,.EFT,.EF2,.EF3" />
          </label>

          <label>
            Sequence
            <select id="sequenceSelect"></select>
          </label>

          <label>
            Component
            <select id="effectSelect"></select>
          </label>
        </section>

        <section id="skillTab" class="browser-panel" role="tabpanel" aria-labelledby="skillTabButton" hidden>
          <label>
            Skill group
            <select id="skillClassSelect"></select>
          </label>

          <label>
            Skill
            <select id="skillSelect"></select>
          </label>

          <fieldset class="skill-role-fieldset">
            <legend>Skill effect</legend>
            <div id="skillRoleButtons" class="skill-role-buttons">
              <button type="button" data-skill-role="startCast">Start Cast</button>
              <button type="button" data-skill-role="casting">Casting</button>
              <button type="button" data-skill-role="castProjectile">Cast/Projectile</button>
              <button type="button" data-skill-role="secondaryOrStop">Secondary/Status</button>
              <button type="button" data-skill-role="area">Area</button>
              <button type="button" data-skill-role="target">Target/Impact</button>
            </div>
          </fieldset>

          <label>
            Requested sequence
            <select id="skillSequenceSelect"></select>
          </label>

          <div id="skillEffectDetail" class="skill-effect-detail">Select a skill effect.</div>
        </section>

        <section id="cloakTab" class="browser-panel cloak-panel" role="tabpanel" aria-labelledby="cloakTabButton" hidden>
          <label>
            PC cloak definition
            <select id="cloakFileSelect" disabled>
              <option>Index a PS0198 data directory first</option>
            </select>
          </label>

          <label>
            Cloth / texture link
            <select id="cloakLinkSelect" disabled>
              <option>Choose a PC file</option>
            </select>
          </label>

          <div id="cloakStatus" class="cloak-status">No cloak loaded.</div>

          <fieldset class="cloak-physics-controls">
            <legend>Cloth physics</legend>
            <label>
              <span>Wind <output id="cloakWindValue">0.8</output></span>
              <input id="cloakWind" type="range" min="0" max="3" value="0.8" step="0.1" />
            </label>
            <label>
              <span>Gravity <output id="cloakGravityValue">1.2</output></span>
              <input id="cloakGravity" type="range" min="0" max="4" value="1.2" step="0.1" />
            </label>
            <label>
              Solver iterations
              <input id="cloakIterations" type="number" min="1" max="16" value="6" step="1" />
            </label>
            <div class="cloak-toggle-grid">
              <label><input id="cloakBodyMotion" type="checkbox" checked /> Body motion</label>
              <label><input id="cloakDebug" type="checkbox" /> Show pins/collider</label>
            </div>
            <button id="resetCloakButton" type="button">Reset cloth</button>
          </fieldset>
        </section>

        <label>
          Particle level <span id="particleLevelLabel">5</span>
          <input id="particleLevel" type="range" min="0" max="20" value="5" />
        </label>

        <label>
          Replay delay
          <input id="replayDelaySeconds" type="number" min="0" step="0.5" value="1" />
        </label>

        <fieldset id="placementControls">
          <legend>Placement</legend>
          <div class="placement-grid">
            <label>
              <span>X</span>
              <input id="placementX" type="number" value="0" step="0.5" />
            </label>
            <label>
              <span>Y</span>
              <input id="placementY" type="number" value="0" step="0.5" />
            </label>
            <label>
              <span>Z</span>
              <input id="placementZ" type="number" value="0" step="0.5" />
            </label>
            <label>
              <span>Yaw</span>
              <input id="placementYaw" type="number" value="0" step="1" />
            </label>
            <label>
              <span>Pitch</span>
              <input id="placementPitch" type="number" value="0" step="1" />
            </label>
            <label>
              <span>Roll</span>
              <input id="placementRoll" type="number" value="0" step="1" />
            </label>
          </div>
          <button id="resetPlacementButton" type="button">Reset Placement</button>
        </fieldset>

        <div class="button-row">
          <button id="rebuildButton" type="button">Rebuild</button>
          <button id="pauseButton" type="button">Pause</button>
        </div>

        <dl id="stats">
          <dt id="libraryStatsLabel">Library</dt>
          <dd id="libraryStats">No EFT loaded</dd>
          <dt>Rendered</dt>
          <dd id="renderStats">0 objects</dd>
          <dt id="renderDetailLabel">Components</dt>
          <dd id="effectStats">No components</dd>
        </dl>

        <pre id="log"></pre>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
